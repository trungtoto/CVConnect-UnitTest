spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cvconnect-core-service?options=-c%20TimeZone%3DUTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    enabled: false
  main:
    allow-bean-definition-overriding: true
